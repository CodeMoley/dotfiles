general {
    disable_loading_bar    = false
    hide_cursor            = true
    grace                  = 0
    no_fade_in             = false
    no_fade_out            = false
    ignore_empty_input     = true
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 2
    blur_size   = 7
    brightness  = 0.6
    contrast    = 1.0
    vibrancy    = 0.2
    color       = rgb(1a1b26)
}

label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(122, 162, 247, 1.0)    # blue  #7aa2f7
    font_size   = 96
    font_family = JetBrainsMono Nerd Font
    font_weight = bold

    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(192, 202, 245, 0.75)   # fg  #c0caf5
    font_size   = 20
    font_family = JetBrainsMono Nerd Font

    position    = 0, -20
    halign      = center
    valign      = center
}

image {
    monitor     =
    path        = ~/.face                     # drop a square PNG here
    size        = 100
    rounding    = -1                          # -1 = fully circular

    border_size  = 0
    border_color = rgba(122, 162, 247, 0.8)  # blue  #7aa2f7
    position    = 0, 200
    halign      = center
    valign      = center
}

input-field {
    monitor     =
    size        = 300, 50
    outline_thickness = 3
    rounding    = 5

    # colours
    outer_color        = rgba(41, 46, 66, 1.0)     
    inner_color        = rgba(26, 27, 38, 1.0)     
    font_color         = rgba(192, 202, 245, 1.0)  
    check_color        = rgba(158, 206, 106, 1.0)  
    fail_color         = rgba(247, 118, 142, 1.0)  
    capslock_color     = rgba(224, 175, 104, 1.0)  

    # focus highlight
    fade_on_empty      = false
    fade_timeout       = 1000
    placeholder_text   = <i><span foreground="##565f89">Enter Password…</span></i>
    hide_input         = false
    dots_size          = 0.3
    dots_spacing       = 0.2
    dots_center        = true

    fail_text          = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition    = 300

    position           = 0, -100
    halign             = center
    valign             = center
}
